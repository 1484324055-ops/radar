<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#F8F9FA" id="theme-color-meta" />
    <meta name="apple-mobile-web-app-title" content="雷达" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <title>雷达</title>
    <script>
      // Prevent theme flash: apply persisted theme before React mounts
      try {
        var d = JSON.parse(localStorage.getItem('radar-data'));
        var t = d && d.theme;
        var colors = { light: '#F8F9FA', dark: '#1A1B1E', warm: '#FFF8F0' };
        if (t && colors[t]) {
          document.documentElement.setAttribute('data-theme', t);
          document.getElementById('theme-color-meta').setAttribute('content', colors[t]);
        }
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
